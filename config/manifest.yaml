# ================================================================
# BSI Fraud Investigation – Semantic Layer Manifest
#
# Design principle:
# Tool descriptions define DATA CONTRACTS — what each tool
# needs as input and what it produces as output.
# The LLM infers call sequence from these dependencies.
# No ordering instructions anywhere in this file.
# ================================================================

tools:
  - name: "verify_case_intake"
    section: "complaint_intelligence"
    description: >
      Reads and validates the submitted complaint form. Extracts key entities from the
      complaint narrative. Returns structured case data including fraud_types (list),
      subject_ids (list[string]), allegations, subjects, and case metadata. Requires: case_id.
    scope: [CASE_SUMMARY]
    python_function: "appworks.appworks_services.get_case_header"

    required_params:
      - name: "case_id"
        type: "string"
        description: "Case identifier from the AppWorks complaint form"

  - name: "fetch_subject_history"
    section: "context_enrichment"
    description: >
      Fetches the full history of the subject under investigation. Returns all prior cases,
      prior_case_count, and subject profile. Requires: subject_ids identifiers from verify_case_intake subjects list.
    scope: [CASE_SUMMARY]
    python_function: "appworks.appworks_services.get_enriched_subject_profile"

    required_params:
      - name: "subject_ids"
        type: "list[string]"
        description: "All subject identifiers from verify_case_intake subjects list"
    optional_params:
      - name: "case_id"
        type: "string"
        description: "Current case identifier from verify_case_intake output — excludes this case from prior_cases and prior_case_count so the active investigation is not counted as its own prior history"

