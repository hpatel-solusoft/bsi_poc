# ================================================================
# BSI Fraud Investigation – Semantic Layer Manifest
#
# Design principle:
# Tool descriptions define DATA CONTRACTS — what each tool
# needs as input and what it produces as output.
# The LLM infers call sequence from these dependencies.
# No ordering instructions anywhere in this file.
# ================================================================

tools:
  - name: "verify_case_intake"
    section: "complaint_intelligence"
    description: >
      Reads and validates the submitted complaint form. Extracts key entities from the
      complaint narrative. Returns structured case data including fraud_types (list),
      subject_ids (list[string]), allegations, subjects, and case metadata. Requires: case_id.
    trigger: AUTO
    python_function: "appworks.appworks_services.get_case_header"

    required_params:
      - name: "case_id"
        type: "string"
        description: "Case identifier from the AppWorks complaint form"

  - name: "fetch_subject_history"
    section: "context_enrichment"
    description: >
      Fetches the full history of the subject under investigation. Returns all prior cases,
      prior_case_count, and subject profile. Requires: subject_ids identifiers from verify_case_intake subjects list.
    trigger: AUTO
    python_function: "appworks.appworks_services.get_enriched_subject_profile"

    required_params:
      - name: "subject_ids"
        type: "list[string]"
        description: "All subject identifiers from verify_case_intake subjects list"
    optional_params:
      - name: "case_id"
        type: "string"
        description: "Current case identifier from verify_case_intake output — excludes this case from prior_cases and prior_case_count so the active investigation is not counted as its own prior history"

  - name: "get_allegation_types"
    section: "allegation_types"
    description: >   
      Fetches all active allegation type definitions from AppWorks. Returns each type with its description and default conduct text. Use the returned    list and the current case allegations to identify all types whose conduct    description is semantically related to the current case — including types    that describe the same scheme under a different label or variant name.    Pass all related type descriptions to the archive search.
    trigger: ON-DEMAND
    python_function: "appworks.appworks_services.get_allegation_types"
    required_params: []
    optional_params: []
    
  - name: "search_similar_cases"
    section: "similar_cases"
    description: >
      Searches the BSI AppWorks archive for historical cases that share
      characteristics with the current investigation. Returns closed and
      active cases with summaries, investigation status, and financial data.
      Requires fraud_types — pass all relevant allegation type labels
      identified from get_allegation_types output, not just the current
      case fraud type label. Multiple fraud types produce a broader
      cross-label candidate pool that surfaces scheme matches regardless
      of how prior cases were classified.
    trigger: ON-DEMAND
    python_function: "appworks.appworks_services.search_similar_cases"
    required_params:
      - name: "fraud_types"
        type: "list[dict]"
        description: "List of allegation type objects from get_allegation_types output
          that are semantically relevant to the current case. Each object
          must include exactly two fields: type_id (the numeric allegation
          type identifier string) and description (the allegation type label).
          CRITICAL: The 'id' MUST be the numeric 'type_id' (e.g., '131073'), NOT the 'short_code'.
          Include all semantically related types — not only the exact fraud
          type on the current case. Broader coverage surfaces scheme matches
          classified under variant labels in prior cases."
    optional_params:
      - name: "case_id"
        type: "string"
        description: "Current case identifier — excludes this case from results"
      - name: "max_total_results"
        type: "integer"
        description: "The maximum number of closest matching cases to return. Defaults to 5 if not specified."
 
  - name: "get_risk_rules"
    section: "risk_rules"
    description: >
      Fetches the active BSI fraud detection rules from the AppWorks configurable rules
      table at runtime. Returns all active rule dimensions with rule_id, condition, weight,
      and active flag. No parameters required.
      This demonstrates that rules are fetched from AppWorks at runtime — BSI can modify
      rules without a code change.
    trigger: ON-DEMAND
    python_function: "appworks.appworks_services.get_risk_rules"

    required_params: []

  - name: "calculate_risk_metrics"
    section: "risk_assessment"
    description: >
      Evaluates active BSI fraud detection rules against the case and subject data.
      Returns risk_score (0-1), risk_tier, risk_indicators with point breakdowns, and recommendation.
      Requires: case_id, subject_id, fraud_types and active_rules.
      active_rules is the rules list returned by get_risk_rules.
      ALWAYS call get_risk_rules first, then pass its result.rules here as active_rules.
      MANDATORY: You MUST pass subject_id from 'subject_primary_id' in verify_case_intake results.
      DO NOT use placeholders like 'primary_subject_id'.
      ALWAYS pass all optional context params from prior tool results — the scoring engine
      uses ONLY what you pass; it cannot make its own AppWorks calls at scoring time.
      Pass: prior_case_count (from context_enrichment.prior_case_count), similar_case_volume (top_n_returned
      from search_similar_cases), distinct_types (count of fraud_types in verify_case_intake),
      has_open_allegation (true if any allegation has no date_closed), subject_count (count of
      subjects from verify_case_intake), received_age (date_received_age from verify_case_intake details).
    trigger: ON-DEMAND
    python_function: "appworks.appworks_services.calculate_risk_metrics"

    required_params:
      - name: "case_id"
        type: "string"
        description: "Case identifier from verify_case_intake output"
      - name: "subject_id"
        type: "string"
        description: "REAL primary subject ID from 'subject_primary_id' in verify_case_intake. DO NOT USE PLACEHOLDERS."
      - name: "fraud_types"
        type: "list[string]"
        description: "Full list of fraud types from verify_case_intake 'fraud_types' field"
      - name: "active_rules"
        type: "list[dict]"
        description: "Active BSI detection rules returned by get_risk_rules"
    optional_params:
      - name: "prior_case_count"
        type: "integer"
        description: "prior_case_count integer from get_enriched_subject_profile result (context_enrichment.prior_case_count)"
      - name: "primary_in_prior_cases"
        type: "integer"
        description: "Count of prior cases where is_primary_subject=true in get_enriched_subject_profile result"
      - name: "similar_case_volume"
        type: "integer"
        description: "top_n_returned integer from search_similar_cases result (similar_cases.top_n_returned)"
      - name: "distinct_types"
        type: "integer"
        description: "Count of fraud types in the current case"
      - name: "has_open_allegation"
        type: "boolean"
        description: "True if any current allegation has date_closed null or missing"
      - name: "subject_count"
        type: "integer"
        description: "Count of subjects in the current investigation"
      - name: "received_age"
        type: "integer"
        description: "date_received_age from verify_case_intake details (days since case received)"
      - name: "fast_track"
        type: "boolean"
        description: "True if case is flagged Fast Track — default false if not known"
      - name: "total_calculated"
        type: "number"
        description: "Total Financial_Calculated — pass 0.0 if no financial data available"
      - name: "total_ordered"
        type: "number"
        description: "Total Financial_Ordered — pass 0.0 if no financial data available"
      - name: "modified_recommendation"
        type: "string"
        description: "Modified recommendation override passed in from the context. If present, MUST be passed to the tool call."

  - name: "get_investigation_plan"
    section: "investigation_plan"
    description: >
      Retrieves the investigation plan context skeleton for the verified case and
      risk profile. Returns only plan metadata (plan_id, fraud_types, risk_tier);
      the LLM is responsible for generating the detailed investigation steps,
      evidence checklist items, and escalation guidance from the route1 case
      context. Requires: fraud_types and risk_tier from prior investigation results.
    trigger: ON-DEMAND
    python_function: "appworks.appworks_services.get_investigation_plan"

    required_params:
      - name: "fraud_types"
        type: "list[string]"
        description: "List of fraud types from verify_case_intake — plan covers all types"
      - name: "risk_tier"
        type: "string"
        description: "Risk tier from calculate_risk_metrics output: LOW/MEDIUM/HIGH/CRITICAL"

  