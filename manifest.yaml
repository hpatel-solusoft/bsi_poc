# ================================================================
# BSI Fraud Investigation – Semantic Layer Manifest
#
# Design principle:
# Tool descriptions define DATA CONTRACTS — what each tool
# needs as input and what it produces as output.
# The LLM infers call sequence from these dependencies.
# No ordering instructions anywhere in this file.
# ================================================================

project: "BSI Fraud Investigation – AI Agentic Workflow"
version: "1.0-POC"

agents:

  - name: "Complaint Intelligence Agent"
    description: "Parses the complaint form, extracts key entities, classifies fraud type."
    tools:
      - name: "verify_case_intake"
        description: >
          Reads a complaint case from AppWorks using a case ID.
          Requires: case_id.
          Returns: case_id, complainant_name, subject_primary, subject_primary_id,
          subject_secondary, complaint_description, fraud_type_classified, intake_date.
        python_function: "appworks_services.get_case_header"
        required_params:
          - name: "case_id"
            type: "string"
            description: "The AppWorks case reference ID e.g. BSI-2024-00421"

  - name: "Context Enrichment Agent"
    description: "Retrieves 5-year subject history and linked entities."
    tools:
      - name: "fetch_subject_history"
        description: >
          Fetches prior case history, address history, and known associates
          for a subject over the last 5 years.
          Requires: subject_id (subject_primary_id from verify_case_intake).
          Returns: prior_case_count, prior_cases, address_history, known_associates.
        python_function: "appworks_services.get_enriched_subject_profile"
        required_params:
          - name: "subject_id"
            type: "string"
            description: "BSI subject identifier — subject_primary_id from verify_case_intake"

  - name: "Similar Case Retrieval Agent"
    description: "Searches vector archive for historically similar fraud cases (RAG)."
    tools:
      - name: "search_similar_cases"
        description: >
          Searches the BSI historical case vector database for fraud cases
          similar to the current complaint narrative.
          Requires: complaint_text (complaint_description from verify_case_intake), top_n.
          Returns: list of matching cases with similarity_score, outcome, and summary.
        python_function: "appworks_services.vector_search_cases"
        required_params:
          - name: "complaint_text"
            type: "string"
            description: "Complaint narrative — complaint_description from verify_case_intake"
          - name: "top_n"
            type: "integer"
            description: "Number of similar cases to return"

  - name: "Fraud Risk Assessment Agent"
    description: "Scores fraud risk using BSI business rules and subject history."
    tools:
      - name: "calculate_risk_metrics"
        description: >
          Applies BSI agency business rules to evaluate fraud risk for a case and subject.
          Requires: case_id (from verify_case_intake), subject_id (subject_primary_id from verify_case_intake).
          Returns: risk_score (0.0–1.0), risk_tier (LOW/MEDIUM/HIGH/CRITICAL), triggered_rules,
          billing_anomaly_flag, recommendation.
        python_function: "appworks_services.get_risk_measures"
        required_params:
          - name: "case_id"
            type: "string"
            description: "The AppWorks case reference ID from verify_case_intake"
          - name: "subject_id"
            type: "string"
            description: "BSI subject identifier — subject_primary_id from verify_case_intake"

  - name: "Case Strategy Agent"
    description: "Recommends investigation steps based on fraud type and risk tier."
    tools:
      - name: "get_investigation_playbook"
        description: >
          Looks up the BSI investigation manual for a specific fraud type and risk level.
          Requires: fraud_type (fraud_type_classified from verify_case_intake),
          risk_level (risk_tier from calculate_risk_metrics).
          Returns: investigation_steps, evidence_checklist, escalation_required.
        python_function: "appworks_services.get_playbook_by_type"
        required_params:
          - name: "fraud_type"
            type: "string"
            description: "Fraud classification — fraud_type_classified from verify_case_intake"
          - name: "risk_level"
            type: "string"
            description: "Risk tier — risk_tier from calculate_risk_metrics"

  - name: "Report Generation Agent"
    description: "Compiles all findings into the final BSI Investigation Report."
    tools:
      - name: "generate_final_report"
        description: >
          Generates the final investigation summary report for a case.
          Requires: case_id (from verify_case_intake).
          Depends on all prior investigation data being collected first —
          verify_case_intake, fetch_subject_history, search_similar_cases,
          calculate_risk_metrics, and get_investigation_playbook must all
          have been called before this tool is useful.
          Returns: report_id, formatted report sections, status.
        python_function: "appworks_services.compile_and_render_report"
        required_params:
          - name: "case_id"
            type: "string"
            description: "The AppWorks case reference ID from verify_case_intake"